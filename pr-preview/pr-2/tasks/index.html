ect path: /home/user/myproject\n- Ensure the real deployment action is executed and the log artifact exists.\n- Log file: /home/user/myproject/output.log\n- The log file must contain the base URL in the format: `Base URL: https://staging-\u003capp-id\u003e.encr.app`.\n- API Endpoints:\n  - GET `/hello/:name`: Returns status 200 and a JSON object with a `message` field.\n\n    ```json\n    // Response\n    {\n      \"message\": \"Hello \u003cname\u003e!\"\n    }\n    ```\n\n"])</script><script>self.__next_f.push([1,"a:T8d8,"])</script><script>self.__next_f.push([1,"# Create a REST API with Encore for Go\n\n## Background\nCreate a simple REST API for managing a list of books using Encore for Go and its built-in PostgreSQL database provisioning, then deploy it to Encore Cloud.\n\n## Requirements\n- Create a new Encore application.\n- The application name must be `books-api-${run-id}`.\n- Implement a RESTful API with the following endpoints:\n  - GET `/books`: List all books.\n  - POST `/books`: Add a new book (fields: `title`, `author`).\n- Store data in a PostgreSQL database using Encore's `sqldb` package.\n- Deploy the application to Encore Cloud.\n- Save the Encore App ID to a log file after deployment.\n\n## Implementation Hints\n- Read the `run-id` from the `ZEALT_RUN_ID` environment variable.\n- To deploy an Encore app to Encore Cloud:\n  1. Initialize a Git repository with `git init`.\n  2. Authenticate Encore by writing the provided `ENCORE_AUTH_TOKEN_JSON` value to `~/.config/encore/.auth_token`: `mkdir -p ~/.config/encore \u0026\u0026 printf '%s' \"$ENCORE_AUTH_TOKEN_JSON\" \u003e ~/.config/encore/.auth_token`.\n  3. Run `encore auth whoami` to confirm authentication.\n  4. Initialize the app using `encore app init books-api-${run-id} --lang go`.\n  5. Add the Encore Git remote: `git remote add encore encore://\u003capp-id\u003e`.\n  6. Commit your code and push to the Encore remote: `git push encore`.\n  7. The deployed endpoint will be available at `https://staging-\u003capp-id\u003e.encr.app/`.\n- Use `encore.dev/storage/sqldb` to define the database and create a migration file (e.g., `1_create_tables.up.sql`) to create the `books` table.\n- Write the App ID to `/home/user/myproject/output.log`.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Ensure the application is deployed to Encore Cloud and the log artifact exists.\n- Log file: /home/user/myproject/output.log\n- The log file must contain the App ID in the format: `App ID: \u003capp-id\u003e`.\n- The deployed API must be accessible at `https://staging-\u003capp-id\u003e.encr.app/`.\n- The API must support POST `/books` to create a book and GET `/books` to list books.\n  - POST `/books` Request: `{\"title\": string, \"author\": string}`\n  - POST `/books` Response: `{\"id\": number, \"title\": string, \"author\": string}`\n  - GET `/books` Response: `[{\"id\": number, \"title\": string, \"author\": string}]`\n\n"])</script><script>self.__next_f.push([1,"b:Ta9a,"])</script><script>self.__next_f.push([1,"# Encore REST API with PostgreSQL\n\n## Background\nCreate a simple REST API for managing a list of books using Encore.ts and its built-in PostgreSQL database support. Encore automatically provisions the database when declared in code.\n\n## Requirements\n- Create an Encore.ts application named `helloworld`.\n- Implement a RESTful API with the following endpoints:\n  - GET `/books`: List all books.\n  - POST `/books`: Add a new book (fields: `title`, `author`).\n  - DELETE `/books/:id`: Remove a book by ID.\n- Store data in a PostgreSQL database managed by Encore.\n- Deploy the application to Encore Cloud.\n- Write the app ID to `app_id.txt` after deployment.\n\n## Implementation Hints\n- The task execution environment does NOT have Docker available, so you cannot run `encore run` locally. You must deploy the app to Encore Cloud for testing.\n- Use `SQLDatabase` from `encore.dev/storage/sqldb` to define the database.\n- Write SQL migrations in the `migrations` directory to create the `books` table.\n- To deploy to Encore Cloud:\n  1. Initialize a Git repository with `git init`.\n  2. Authenticate Encore by writing the provided `ENCORE_AUTH_TOKEN_JSON` value to `~/.config/encore/.auth_token` (e.g., `mkdir -p ~/.config/encore \u0026\u0026 printf '%s' \"$ENCORE_AUTH_TOKEN_JSON\" \u003e ~/.config/encore/.auth_token`), then verify with `encore auth whoami`.\n  3. Initialize the Encore app with `encore app init helloworld --lang ts`.\n  4. Get the app ID from the output or `encore.app` file.\n  5. Add the Encore Git remote: `git remote add encore encore://\u003capp-id\u003e`.\n  6. Commit your code and push: `git push encore`.\n  7. The deployment may take about 2 minutes. The deployed endpoint will be `https://staging-\u003capp-id\u003e.encr.app/`.\n- Write the app ID to `/home/user/helloworld/app_id.txt` in the format `App ID: \u003capp_id\u003e`.\n\n## Acceptance Criteria\n- Project path: /home/user/helloworld\n- Ensure the app is deployed to Encore Cloud and the log artifact exists.\n- Log file: /home/user/helloworld/app_id.txt\n- The log file must contain the app ID in the format: `App ID: \u003capp_id\u003e`.\n- API Endpoints (accessed via `https://staging-\u003capp_id\u003e.encr.app/`):\n  - GET `/books`: Returns status 200 and a JSON array of book objects.\n\n    ```json\n    // Response\n    [\n      {\n        \"id\": number,\n        \"title\": string,\n        \"author\": string\n      }\n    ]\n    ```\n\n  - POST `/books`: Accepts book object JSON and returns 200 OK with the new book object.\n\n    ```json\n    // Request\n    {\n      \"title\": string,\n      \"author\": string\n    }\n    ```\n    ```json\n    // Response\n    {\n      \"id\": number,\n      \"title\": string,\n      \"author\": string\n    }\n    ```\n\n  - DELETE `/books/:id`: Deletes the book with the given ID and returns 200 OK.\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"N-d_1RPtOxCXiVd73oQuA\",\"c\":
